{% extends 'base.html' %}

{% block title %}Login / Sign Up - Alpha Research Server{% endblock %}

{% block content %}
<div class="login-header-text">
    <h1 style="color: var(--primary);">Alpha Research</h1>
    <p>Premium Market Insights & Paid Surveys</p>
</div>

<div class="glass-card" style="box-shadow: 0 15px 30px rgba(37, 99, 235, 0.05); border-radius: var(--radius-lg);">
    <!-- Sliding Tab Switcher -->
    <div class="auth-tabs">
        <button id="tabLogin" class="auth-tab-btn active" onclick="switchAuthTab('login')">Log In</button>
        <button id="tabRegister" class="auth-tab-btn" onclick="switchAuthTab('register')">Register</button>
    </div>

    <!-- Login Form -->
    <form id="formLogin" action="{{ url_for('login') }}" method="POST">
        <input type="hidden" name="action" value="login">
        
        <div class="form-group">
            <label class="form-label" for="loginEmail">Email Address</label>
            <input type="email" id="loginEmail" name="email" class="form-input" placeholder="name@example.com" required>
        </div>

        <div class="form-group">
            <label class="form-label" for="loginPassword">Password</label>
            <input type="password" id="loginPassword" name="password" class="form-input" placeholder="••••••••" required>
        </div>

        <button type="submit" class="btn" style="margin-top: 10px;">
            <span>Sign In</span>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
        </button>
    </form>

    <!-- Register Form -->
    <form id="formRegister" action="{{ url_for('login') }}" method="POST" style="display: none;">
        <input type="hidden" name="action" value="register">

        <div class="form-group">
            <label class="form-label" for="regUsername">Username</label>
            <input type="text" id="regUsername" name="username" class="form-input" placeholder="survey_champ" required>
        </div>
        
        <div class="form-group">
            <label class="form-label" for="regEmail">Email Address</label>
            <input type="email" id="regEmail" name="email" class="form-input" placeholder="name@example.com" required>
        </div>

        <div class="form-group">
            <label class="form-label" for="regPassword">Password</label>
            <input type="password" id="regPassword" name="password" class="form-input" placeholder="Create robust password" required>
        </div>

        <div class="form-group">
            <label class="form-label" for="regReferral">Referral Code (Optional)</label>
            <input type="text" id="regReferral" name="referral_code" class="form-input" style="text-transform: uppercase;" placeholder="Enter code for bonus (e.g., REF123)">
            <p style="font-size: 11px; color: var(--primary); margin-top: 6px; font-weight: 600;">🎁 Entering a valid code grants you a $2.00 signup reward!</p>
        </div>

        <button type="submit" class="btn" style="margin-top: 10px;">
            <span>Create Account</span>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="8.5" cy="7" r="4"></circle><line x1="20" y1="8" x2="20" y2="14"></line><line x1="23" y1="11" x2="17" y2="11"></line></svg>
        </button>
    </form>
</div>
{% endblock %}

{% block scripts %}
<script>
    // Handles tab switching between Login and Signup modes
    function switchAuthTab(mode) {
        const tabLogin = document.getElementById('tabLogin');
        const tabRegister = document.getElementById('tabRegister');
        const formLogin = document.getElementById('formLogin');
        const formRegister = document.getElementById('formRegister');

        if (mode === 'login') {
            tabLogin.classList.add('active');
            tabRegister.classList.remove('active');
            formLogin.style.display = 'block';
            formRegister.style.display = 'none';
        } else {
            tabLogin.classList.remove('active');
            tabRegister.classList.add('active');
            formLogin.style.display = 'none';
            formRegister.style.display = 'block';
        }
    }
</script>
{% endblock %}
